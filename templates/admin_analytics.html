<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Analytics - TendGraph</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        /* BODY */
        body {
            background: #f6f7fb;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: linear-gradient(160deg, #6c4df6, #8b73ff);
            padding: 30px 20px;
            position: fixed;
        }

        .sidebar .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .sidebar .logo span {
            color: #ddd;
        }

        /* SIDEBAR LINKS */
        .sidebar a {
            display: block;
            padding: 12px 18px;
            margin-bottom: 10px;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.2);
            padding-left: 24px;
        }

        .sidebar a.active {
            background: white;
            color: #6c4df6;
            font-weight: 600;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            width: 100%;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .header h2 {
            color: #444;
        }

        .admin-box {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
        }

        /* CONTENT */
        .content {
            padding: 40px;
        }

        /* CARDS */
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card i {
            margin-bottom: 15px;
        }

        .card h5 {
            color: #444;
            margin-bottom: 5px;
            font-size: 16px;
        }

        /* SECTION TITLE */
        .section-title {
            margin-top: 35px;
            margin-bottom: 15px;
            color: #444;
            font-size: 20px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        /* CHART SECTION */
        .chart-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            margin-top: 35px;
        }

        .chart-section h4 {
            color: #444;
            font-size: 18px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* CHART GRID */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* RESPONSIVE */
        @media(max-width:1000px) {
            .sidebar {
                display: none;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .chart-grid {
                grid-template-columns: 1fr;
            }

            .main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">
            <i class="fa fa-chart-line"></i> Tend<span>Graph</span>
        </div>

        <a href="/admin_dashboard">
            <i class="fa fa-home"></i> Dashboard
        </a>
        <a href="/admin_analytics" class="active">
            <i class="fa fa-chart-bar"></i> Analytics
        </a>
        <a href="/">
            <i class="fa fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h2>Admin Analytics</h2>
            <div class="admin-box">
                <i class="fa fa-user-circle"></i>
                Admin Panel
            </div>
        </div>

        <div class="content">
            <!-- PRODUCT SCORE CARDS -->
            <div class="grid">
                {% for p in products %}
                <div class="card">
                    <i class="fa fa-box fa-2x" style="color:#6c4df6"></i>
                    <h5>{{p.name}}</h5>
                    <p style="color:#777; font-size:13px; margin-bottom:10px;">
                        Interaction Score
                    </p>
                    <h3 style="color:#8b73ff">
                        {{p.score}}
                    </h3>
                </div>
                {% endfor %}
            </div>

            <!-- ANALYTICS CHARTS -->
            <div class="chart-section">
                <h4>
                    <i class="fa fa-chart-bar" style="color:#6c4df6"></i>
                    Product Interaction Overview
                </h4>
                <div class="chart-grid">
                    <div>
                        <canvas id="interactionChart"></canvas>
                    </div>
                    <div>
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var labels = {{ products | map(attribute = 'name') | list | tojson | safe }};
        var scores = {{ products | map(attribute = 'score') | list | tojson | safe }};

        /* BAR CHART */
        new Chart(document.getElementById("interactionChart"), {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: "Interaction Score",
                    data: scores,
                    backgroundColor: "#6c4df6",
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        /* PIE CHART */
        new Chart(document.getElementById("pieChart"), {
            type: "pie",
            data: {
                labels: labels,
                datasets: [{
                    data: scores,
                    backgroundColor: [
                        "#6c4df6",
                        "#8b73ff",
                        "#a896ff",
                        "#c4b8ff",
                        "#e0daff",
                        "#4a2dd4"
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html>
<head>

<title>Seller Demand Map - TendGraph</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f6f7fb;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:linear-gradient(160deg,#6c4df6,#8b73ff);
padding:30px 20px;
position:fixed;
}

.logo{
color:white;
font-size:22px;
font-weight:bold;
margin-bottom:40px;
}

.logo span{
color:#ddd;
}

.sidebar a{
display:block;
padding:12px 18px;
margin-bottom:10px;
color:white;
text-decoration:none;
border-radius:30px;
font-weight:500;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
padding-left:22px;
}

.sidebar a.active{
background:white;
color:#6c4df6;
}

/* MAIN */

.main{
margin-left:240px;
width:100%;
}

/* HEADER */

.header{
background:white;
padding:20px 40px;
font-size:20px;
font-weight:600;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* CONTENT */

.content{
padding:40px;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:14px;
border:2px solid #ecebff;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
margin-bottom:30px;
position:relative;
}

.card:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,#6c4df6,#8b73ff);
border-radius:14px 14px 0 0;
}

.card h3{
margin-bottom:20px;
}

/* MAP */

#map{
height:420px;
border-radius:10px;
}

/* CHART */

.chart{
height:420px;
}

/* NETWORK */

#networkGraph{
height:420px;
border:1px solid #eee;
border-radius:10px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<i class="fa fa-chart-line"></i> Tend<span>Graph</span>
</div>

<a href="/seller_dashboard">
<i class="fa fa-home"></i> Dashboard
</a>

<a href="/seller_analytics">
<i class="fa fa-chart-line"></i> Sales Analytics
</a>

<a href="/seller_dash" class="active">
<i class="fa fa-map-marker-alt"></i> Demand Map
</a>

<a href="/community">
<i class="fa fa-users"></i> Community Trends
</a>

<a href="/demand">
<i class="fa fa-chart-bar"></i> Product Demand
</a>

<a href="/logout">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">
Seller AI Demand Dashboard
</div>

<div class="content">

<!-- MAP -->

<div class="card">
<h3>Geographic Demand Map</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>Sales Trend</h3>
<div id="trendChart" class="chart"></div>
</div>

<div class="card">
<h3>Demand Growth Flow</h3>
<div id="areaChart" class="chart"></div>
</div>

<div class="card">
<h3>Product Market Comparison</h3>
<div id="lineChart" class="chart"></div>
</div>

<div class="card">
<h3>Location Demand</h3>
<div id="waterfallChart" class="chart"></div>
</div>

<div class="card">
<h3>Purchasing Activity</h3>
<div id="timelineChart" class="chart"></div>
</div>

<div class="card">
<h3>Purchasing Community Network</h3>
<div id="networkGraph"></div>
</div>

</div>

</div>


<script>

/* MAP */

var map = L.map('map').setView([20.5937,78.9629],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:18}
).addTo(map);

var points = {{ map_data | tojson }};

points.forEach(function(p){

let color="green";

if(p.level=="low") color="red";
if(p.level=="medium") color="orange";

L.circleMarker([p.lat,p.lng],{
radius:8,
color:color,
fillColor:color,
fillOpacity:0.9
}).addTo(map);

});

/* DATA */

var productDemand = {};
var locationDemand = {};

points.forEach(function(p){

if(!productDemand[p.product]) productDemand[p.product]=0;
if(!locationDemand[p.name]) locationDemand[p.name]=0;

productDemand[p.product]+=p.demand;
locationDemand[p.name]+=p.demand;

});

var productArray = [];
for (var pName in productDemand) {
    productArray.push({name: pName, count: productDemand[pName]});
}
productArray.sort(function(a, b) { return b.count - a.count; });

var locationNames = Object.keys(locationDemand);
var locationCounts = Object.values(locationDemand);

/* LIMIT PRODUCTS TO 25 */

var LIMIT_PRODUCTS = 25;
var topProducts = productArray.slice(0, LIMIT_PRODUCTS);

var productNames = topProducts.map(function(p) { return p.name; });
var productCounts = topProducts.map(function(p) { return p.count; });

/* DONUT */

new ApexCharts(document.querySelector("#trendChart"),{
chart:{type:"donut",height:420},
series:productCounts,
labels:productNames
}).render();

/* AREA */

new ApexCharts(document.querySelector("#areaChart"),{
chart:{type:"area",height:420},
series:[{name:"Demand",data:locationCounts}],
xaxis:{categories:locationNames}
}).render();

/* LINE */

new ApexCharts(document.querySelector("#lineChart"),{
chart:{type:"line",height:420},
series:[{name:"Demand",data:productCounts}],
xaxis:{categories:productNames}
}).render();

/* BAR */

new ApexCharts(document.querySelector("#waterfallChart"),{
chart:{type:"bar",height:420},
series:[{name:"Demand",data:locationCounts}],
xaxis:{categories:locationNames}
}).render();

/* ACTIVITY */

new ApexCharts(document.querySelector("#timelineChart"),{
chart:{type:"area",height:420},
series:[{name:"Activity",data:productCounts}],
xaxis:{categories:productNames}
}).render();

/* NETWORK */

var nodes = new vis.DataSet([{id:1,label:"Customers",size:35}]);
var edges = new vis.DataSet([]);

var id=2;

productNames.forEach(function(p){

nodes.add({id:id,label:p});
edges.add({from:1,to:id});
id++;

});

new vis.Network(
document.getElementById("networkGraph"),
{nodes:nodes,edges:edges},
{nodes:{shape:"dot"},edges:{width:2}}
);

</script>

</body>
</html>
